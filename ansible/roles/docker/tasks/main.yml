- name: Gather installed packages (detect Docker CE from apt)
  ansible.builtin.package_facts:
    manager: auto

- name: Set fact whether Docker Engine (docker-ce) is installed
  ansible.builtin.set_fact:
    docker_ce_installed: "{{ 'docker-ce' in (ansible_facts.packages | default({})) }}"

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    update_cache: false
    state: present
  when: not docker_ce_installed

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: not docker_ce_installed

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  when: not docker_ce_installed

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present
  when: not docker_ce_installed

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: false
    state: present
  when: not docker_ce_installed

- name: Install Python tooling for Ansible docker modules
  ansible.builtin.apt:
    name:
      - python3-pip
    state: present
    update_cache: false

- name: Install Docker SDK for Python
  ansible.builtin.pip:
    name: docker
    state: present
    executable: pip3

- name: Enable Docker service
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
